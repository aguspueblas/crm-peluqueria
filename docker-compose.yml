services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm_peluqueria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./db/migrations/002_conversaciones.sql:/docker-entrypoint-initdb.d/002_conversaciones.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: crm_peluqueria
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
